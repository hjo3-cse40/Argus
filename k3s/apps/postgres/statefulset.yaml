apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: argus
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "argus"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argus-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "argus"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
