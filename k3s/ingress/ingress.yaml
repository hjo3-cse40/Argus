apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argus-ingress
  namespace: argus
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: argus.masondrake.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
