name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tags
        run: |
          SHA_TAG="sha-${{ github.event.workflow_run.head_sha }}"
          
          # Update api image to the specific sha tag
          sed -i -E "s|image: ghcr.io/.*/argus-api:.*|image: ghcr.io/${{ github.repository }}-api:${SHA_TAG}|g" k3s/apps/api/deployment.yaml
          
          # Update worker image to the specific sha tag
          sed -i -E "s|image: ghcr.io/.*/argus-worker:.*|image: ghcr.io/${{ github.repository }}-worker:${SHA_TAG}|g" k3s/apps/worker/deployment.yaml
          
          echo "Updated image tags to: ${SHA_TAG}"
          echo "API:"
          grep "image:" k3s/apps/api/deployment.yaml
          echo "Worker:"
          grep "image:" k3s/apps/worker/deployment.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the files first
          git add k3s/apps/api/deployment.yaml k3s/apps/worker/deployment.yaml
          
          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: deploy image tag sha-${{ github.event.workflow_run.head_sha }}"
          git push

      - name: Show changes
        run: |
          git diff HEAD~1 -- k3s/apps/
