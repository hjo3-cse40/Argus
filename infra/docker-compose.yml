services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # UI
    environment:
      RABBITMQ_DEFAULT_USER: argus
      RABBITMQ_DEFAULT_PASS: argus
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rsshub:
    image: diygod/rsshub
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    # Upstream RSSHub exposes /healthz; wget is often missing from the image (probe always fails).
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:1200/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: argus
      DB_PASSWORD: argus
      DB_NAME: argus
      RABBITMQ_URL: amqp://argus:argus@rabbitmq:5672/
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_UPSTREAM: http://api:8080
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["./worker"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: argus
      DB_PASSWORD: argus
      DB_NAME: argus
      RABBITMQ_URL: amqp://argus:argus@rabbitmq:5672/
      API_BASE_URL: http://api:8080
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  rss:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["./rss"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: argus
      DB_PASSWORD: argus
      DB_NAME: argus
      RABBITMQ_URL: amqp://argus:argus@rabbitmq:5672/
      RSSHUB_BASE_URL: http://rsshub:1200
      RSS_SEEN_IDS_FILE: /data/seen_ids.txt
    volumes:
      - rss_seen_data:/data
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      rsshub:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  rss_seen_data:
